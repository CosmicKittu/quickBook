<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ TITLE }}</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --bg4: #222736;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555c78;
    --accent: #7c6ef7;
    --accent2: #5b4fe3;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #f06565;
    --blue: #4da6ff;
    --pink: #e879a0;
    --teal: #2ed8c3;
    --cpp: #f5a623;
    --js: #3ecf8e;
    --font: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .sidebar-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .sidebar-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .sidebar-nav { padding: 12px 0; flex: 1; }
  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 12px 20px 6px;
  }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    font-size: 13.5px;
    color: var(--text2);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    font-weight: 500;
    text-decoration: none;
  }
  .nav-link:hover { color: var(--text); background: var(--bg3); border-left-color: var(--border2); }
  .nav-link.active { color: var(--accent); background: rgba(124,110,247,0.08); border-left-color: var(--accent); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0.6; }

  /* ── MAIN ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 48px 56px;
  }
  #main > * {
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  /* ── SECTIONS ── */
  .section { margin-bottom: 64px; scroll-margin-top: 24px; }
  .section-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(124,110,247,0.12);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-family: var(--mono);
  }
  h1.section-title {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  h2.section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .section-desc {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 28px;
    line-height: 1.7;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, rgba(124,110,247,0.1) 0%, rgba(62,207,142,0.06) 100%);
    border: 1px solid rgba(124,110,247,0.2);
    border-radius: 16px;
    padding: 36px;
    margin-bottom: 48px;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-family: var(--mono);
  }
  .hero h1 {
    font-size: 40px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 16px; color: var(--text2); line-height: 1.7; max-width: 560px; margin-bottom: 20px; }
  .hero-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .hero-tag {
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
  }
  .tag-cpp { color: var(--cpp); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.08); }
  .tag-js { color: var(--js); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.08); }
  .tag-blue { color: var(--blue); border-color: rgba(77,166,255,0.3); background: rgba(77,166,255,0.08); }

  /* ── CODE COMPARE ── */
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .compare-block { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .compare-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
  }
  .compare-header.cpp { background: rgba(245,166,35,0.08); color: var(--cpp); }
  .compare-header.js { background: rgba(62,207,142,0.08); color: var(--js); }
  .compare-header .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── CODE BLOCKS ── */
  pre {
    background: var(--bg3);
    padding: 16px 18px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    margin: 16px 0;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .compare pre { margin: 0; border-radius: 0; border: none; }
  code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg3);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--teal);
  }

  /* syntax colors */
  .kw { color: var(--accent); font-weight: 500; }
  .fn { color: var(--blue); }
  .str { color: var(--green); }
  .num { color: var(--amber); }
  .cmt { color: var(--text3); font-style: italic; }
  .type { color: var(--teal); }
  .op { color: var(--pink); }

  /* ── CALLOUT BOXES ── */
  .callout {
    border-radius: var(--radius);
    padding: 14px 18px;
    margin: 20px 0;
    border-left: 3px solid;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .callout-body { flex: 1; }
  .callout-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .callout-text { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
  .callout-text code { font-size: 12px; }
  .callout.warn { background: rgba(245,166,35,0.07); border-color: var(--amber); }
  .callout.warn .callout-title { color: var(--amber); }
  .callout.info { background: rgba(77,166,255,0.07); border-color: var(--blue); }
  .callout.info .callout-title { color: var(--blue); }
  .callout.tip { background: rgba(62,207,142,0.07); border-color: var(--green); }
  .callout.tip .callout-title { color: var(--green); }
  .callout.danger { background: rgba(240,101,101,0.07); border-color: var(--red); }
  .callout.danger .callout-title { color: var(--red); }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 13.5px; }
  th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
  td:first-child { color: var(--text); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .cpp-col { color: var(--cpp) !important; }
  .js-col { color: var(--js) !important; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

  /* ── INLINE TAG ── */
  .tag-inline {
    display: inline-block;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .tag-o1 { background: rgba(62,207,142,0.15); color: var(--green); }
  .tag-on { background: rgba(245,166,35,0.15); color: var(--amber); }
  .tag-onlogn { background: rgba(77,166,255,0.15); color: var(--blue); }
  .tag-on2 { background: rgba(240,101,101,0.15); color: var(--red); }

  /* ── SCROLL PROGRESS ── */
  #progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 999; transition: width 0.1s; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 48px;
    padding: 32px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }
  .attribution-badge {
    position: absolute;
    top: 32px;
    right: 48px;
    font-size: 12px;
    color: var(--text2);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: var(--mono);
    text-decoration: none;
    transition: all 0.2s;
    z-index: 100;
  }
  .attribution-badge:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(124,110,247,0.08);
  }
  .attribution-badge span {
    color: var(--accent);
    font-weight: 600;
  }
</style>

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<style>
  /* Prism Custom Overrides for Deep Dark Mode */
  pre[class*="language-"] {
    background: var(--bg3) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    font-family: var(--mono) !important;
    font-size: 13px !important;
    line-height: 1.7 !important;
    padding: 16px 18px !important;
    margin: 16px 0 !important;
    text-shadow: none !important;
  }
  code[class*="language-"], pre[class*="language-"] {
    color: var(--teal) !important;
    text-shadow: none !important;
    font-family: var(--mono) !important;
  }
  
  .token.keyword, .token.selector, .token.important, .token.atrule {
    color: var(--accent) !important;
    font-weight: 500 !important;
  }
  .token.string, .token.char, .token.attr-value, .token.regex, .token.variable {
    color: var(--green) !important;
  }
  .token.number, .token.boolean {
    color: var(--amber) !important;
  }
  .token.comment, .token.prolog, .token.doctype, .token.cdata {
    color: var(--text3) !important;
    font-style: italic !important;
  }
  .token.function, .token.class-name {
    color: var(--blue) !important;
  }
  .token.operator, .token.entity, .token.url {
    color: var(--pink) !important;
    background: none !important;
  }
  .token.property, .token.tag, .token.constant, .token.symbol, .token.deleted {
    color: var(--red) !important;
  }
</style>
</head>
<body>

<div id="progress"></div>

<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">{{ LOGO_TEXT }}</div>
    <div class="sidebar-title">{{ SIDEBAR_TITLE }}</div>
    <div class="sidebar-sub">{{ SIDEBAR_SUBTITLE }}</div>
  </div>
  <div class="sidebar-nav">
    {{ SIDEBAR_LINKS }}
  </div>
</nav>

<main id="main" style="position: relative;">

<a href="https://github.com/SaketV8" target="_blank" class="attribution-badge">
  Content by <span>Saket Maurya</span> (Automated Build)
</a>

{{ HERO }}

{{ CONTENT }}

<div class="footer">
  {{ TITLE }} &nbsp;&middot;&nbsp; Quick Reference Guide
</div>

</main>


<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

<script>
  // Progress bar
  const main = document.getElementById('main');
  const progress = document.getElementById('progress');
  window.addEventListener('scroll', () => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const pct = (scrollTop / scrollHeight) * 100;
    progress.style.width = pct + '%';
  });

  // Navigation
  const sections = document.querySelectorAll('.section, .hero');
  const navLinks = document.querySelectorAll('.nav-link');

  function navTo(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Highlight active nav link based on scroll position
  window.addEventListener('scroll', () => {
    let current = 'intro';
    
    sections.forEach(s => {
      const rect = s.getBoundingClientRect();
      if (rect.top <= 150) {
        current = s.id;
      }
    });

    // If at the absolute bottom of the page, highlight the last section
    if (window.innerHeight + Math.round(window.scrollY) >= document.documentElement.scrollHeight - 10) {
      if (sections.length > 0) {
        current = sections[sections.length - 1].id;
      }
    }

    navLinks.forEach(l => {
      const onclick = l.getAttribute('onclick') || '';
      l.classList.toggle('active', onclick.includes(`'${current}'`));
    });
  });

  // Trigger initial highlight
  window.dispatchEvent(new Event('scroll'));
</script>
</body>
</html>
